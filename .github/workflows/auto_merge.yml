name: Auto Merge PRs to Jules

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jules
        uses: actions/checkout@v3
        with:
          ref: jules  # Trae la rama jules directamente
          fetch-depth: 0  # Necesario para merges

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch PR branch
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-branch
          git checkout jules

      - name: Merge PR into jules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git merge --no-ff pr-branch -m "Auto-merge PR #${{ github.event.pull_request.number }}"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} jules